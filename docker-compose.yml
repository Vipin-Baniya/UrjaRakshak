# UrjaRakshak — Local Development Docker Compose
# Usage: docker-compose up -d
# Then seed demo data: docker-compose exec api python seed_demo_data.py

version: '3.8'

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: urjarakshak-api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://urjarakshak:urjarakshak@postgres:5432/urjarakshak
      - SECRET_KEY=docker-dev-secret-change-in-production-32chars!!
      - ENABLE_STRICT_ETHICS=true
      - ENABLE_AUDIT_LOGGING=true
      # Uncomment to enable AI interpretation:
      # - OPENAI_API_KEY=sk-...
      # - ANTHROPIC_API_KEY=sk-ant-...
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - urjarakshak-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: urjarakshak-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - urjarakshak-net

  postgres:
    image: postgres:15-alpine
    container_name: urjarakshak-postgres
    environment:
      - POSTGRES_DB=urjarakshak
      - POSTGRES_USER=urjarakshak
      - POSTGRES_PASSWORD=urjarakshak
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - urjarakshak-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urjarakshak"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

networks:
  urjarakshak-net:
    driver: bridge
