name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_NODE_API_URL: http://localhost:4000

  # ── Node.js Backend ───────────────────────────────────────────────────────
  nodejs-backend:
    name: Node.js Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nodejs-backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nodejs-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --passWithNoTests
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-at-least-32-characters-long
          MONGODB_URL: mongodb://localhost:27017/urjarakshak_test
          REDIS_URL: redis://localhost:6379

  # ── Python Backend ────────────────────────────────────────────────────────
  python-backend:
    name: Python Backend (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest app/tests/ -v --tb=short
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          SECRET_KEY: test-secret-key-for-ci-at-least-32-characters
          ENVIRONMENT: test
          ENABLE_STRICT_ETHICS: 'false'
          ENABLE_AUDIT_LOGGING: 'false'

  # ── Python Backend (new structure) ────────────────────────────────────────
  python-backend-new:
    name: Python Backend (New Structure)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: python-backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run physics engine tests
        run: python -m pytest app/tests/ -v --tb=short
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          SECRET_KEY: test-secret-key-for-ci-at-least-32-characters
          ENVIRONMENT: test
